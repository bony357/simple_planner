<!doctype html>
<html lang="pl" data-theme="color">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/simple_planner/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f2933" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Simple Planner</title>
    <script>
      // Ustaw motyw jak najwcześniej, aby uniknąć mignięcia (FOUC).
      try {
        var saved = JSON.parse(localStorage.getItem('planner-settings') || '{}')
        var theme = (saved.state && saved.state.theme) || 'color'
        document.documentElement.setAttribute('data-theme', theme)
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
